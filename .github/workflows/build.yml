name: Build Linux

on:
  push:
    branches: [main]
    tags: ['v*', 'sunrise']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'

      - name: Install Fyne CGO dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc pkg-config libc6-dev \
            libgl1-mesa-dev libx11-dev libxext-dev \
            libxcursor-dev libxrandr-dev libxinerama-dev \
            libxi-dev libxxf86vm-dev

      - name: Build (linux/amd64)
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -trimpath -ldflags "-s -w" -o cipherproxy-linux-amd64 .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: cipherproxy-linux-amd64
          path: cipherproxy-linux-amd64

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: cipherproxy-linux-amd64
