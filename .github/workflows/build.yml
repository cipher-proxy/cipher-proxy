name: Build

on:
  push:
    branches: [main]
    tags: ['v*', 'sunrise']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'

      - name: Install fyne-cross
        run: go install github.com/fyne-io/fyne-cross@latest

      - name: Build all targets (linux amd64/arm64, windows amd64, darwin amd64/arm64)
        run: fyne-cross linux/amd64 linux/arm64 windows/amd64 darwin/amd64 darwin/arm64

      - name: Prepare release assets
        run: |
          mkdir -p dist
          cp fyne-cross/bin/linux-amd64/cipherproxy   dist/cipherproxy-linux-amd64
          cp fyne-cross/bin/linux-arm64/cipherproxy   dist/cipherproxy-linux-arm64
          cp fyne-cross/bin/windows-amd64/cipherproxy.exe dist/cipherproxy-windows-amd64.exe
          ( cd fyne-cross/dist/darwin-arm64 && zip -r -q ../../../dist/cipherproxy-darwin-arm64.zip "Cipher Proxy.app" )
          ( cd fyne-cross/dist/darwin-amd64 && zip -r -q ../../../dist/cipherproxy-darwin-amd64.zip "Cipher Proxy.app" )
          ls -la dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cipherproxy-builds
          path: dist/*

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
